<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Peralatan — DCS PLTU Interaktif</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── HEADER ─────────────────────────────────────────────── -->
  <header class="app-header">
    <div class="header-left">
      <div class="app-logo">⚡</div>
      <div>
        <div class="app-title">DCS PLTU INTERAKTIF</div>
        <div class="app-subtitle">Daftar Peralatan</div>
      </div>
    </div>
    <nav class="main-nav">
      <a href="index.html" class="nav-btn">PETA</a>
      <a href="equipment.html" class="nav-btn active">PERALATAN</a>
      <a href="procedure.html" class="nav-btn">PROSEDUR</a>
      <a href="editor.html" class="nav-btn editor-btn">EDITOR</a>
    </nav>
  </header>

  <!-- ── CONTENT ────────────────────────────────────────────── -->
  <div class="page-content">
    <div class="page-title">
      ⚙ DAFTAR PERALATAN
      <span id="equipCount" style="font-size:0.75rem;color:var(--text-secondary);font-weight:normal"></span>
    </div>

    <!-- Search & Actions -->
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="🔍 Cari nama, KKS, atau tipe..."
             oninput="filterTable()" style="max-width:400px">
      <select id="filterType" onchange="filterTable()"
              style="width:auto;min-width:140px">
        <option value="">Semua Tipe</option>
        <option value="Equipment">Equipment</option>
        <option value="Valve">Valve</option>
        <option value="Sensor">Sensor</option>
      </select>
      <button class="btn-primary" onclick="openModal()">+ Tambah Peralatan</button>
      <button class="btn-secondary" onclick="exportCSV()">⬇ Export CSV</button>
    </div>

    <!-- Table -->
    <div class="table-wrapper">
      <table class="data-table" id="equipTable">
        <thead>
          <tr>
            <th style="width:40px">#</th>
            <th>Nama Peralatan</th>
            <th>Kode KKS</th>
            <th>Tipe</th>
            <th>Keterangan</th>
            <th style="width:100px;text-align:center">Aksi</th>
          </tr>
        </thead>
        <tbody id="equipTableBody">
          <!-- Diisi oleh JS -->
        </tbody>
      </table>
    </div>

    <div id="noDataMsg" style="display:none;text-align:center;padding:2rem;color:var(--text-dim);font-style:italic">
      Tidak ada data yang cocok dengan pencarian.
    </div>
  </div>

  <!-- ── MODAL EDIT/TAMBAH ───────────────────────────────────── -->
  <div class="modal-overlay" id="equipModal">
    <div class="modal-card">
      <button class="modal-close" onclick="closeModal()">×</button>
      <h3 id="modalTitle">TAMBAH PERALATAN</h3>
      <input type="hidden" id="editId">
      <div class="form-group">
        <label>Nama Peralatan *</label>
        <input type="text" id="editName" placeholder="Nama peralatan...">
      </div>
      <div class="form-group">
        <label>Kode KKS *</label>
        <input type="text" id="editKks" placeholder="XX-XXX-000">
      </div>
      <div class="form-group">
        <label>Tipe</label>
        <select id="editType">
          <option value="Equipment">Equipment</option>
          <option value="Valve">Valve</option>
          <option value="Sensor">Sensor</option>
        </select>
      </div>
      <div class="form-group">
        <label>Keterangan</label>
        <textarea id="editDesc" rows="3" placeholder="Deskripsi peralatan..."></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn-secondary" onclick="closeModal()">Batal</button>
        <button class="btn-success"   onclick="saveItem()">💾 Simpan</button>
      </div>
    </div>
  </div>

  <!-- ── TOAST ──────────────────────────────────────────────── -->
  <div class="toast" id="toast"></div>

  <script src="data.js"></script>
  <script>
  // ── STATE ────────────────────────────────────────────────────
  var eqData = null;

  // ── INIT ─────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', function() {
    var saved = localStorage.getItem('dcs_pltu_data');
    if (saved) {
      try { eqData = JSON.parse(saved); }
      catch(e) { eqData = JSON.parse(JSON.stringify(DEFAULT_DATA)); }
    } else {
      eqData = JSON.parse(JSON.stringify(DEFAULT_DATA));
    }
    renderTable();
  });

  // ── UTILITY ──────────────────────────────────────────────────
  function escHtml(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  function genId(prefix) {
    return prefix + '_' + Date.now() + '_' + Math.floor(Math.random()*10000);
  }

  function saveData() {
    localStorage.setItem('dcs_pltu_data', JSON.stringify(eqData));
  }

  function showToast(msg, isError) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast' + (isError ? ' error' : '') + ' show';
    setTimeout(function() { t.className = 'toast' + (isError ? ' error' : ''); }, 2800);
  }

  // ── RENDER TABLE ─────────────────────────────────────────────
  function renderTable(items) {
    var data = items || eqData.equipment;
    var tbody = document.getElementById('equipTableBody');
    var count = document.getElementById('equipCount');
    var noMsg = document.getElementById('noDataMsg');
    var table = document.getElementById('equipTable');

    count.textContent = '(' + eqData.equipment.length + ' total, ' + data.length + ' ditampilkan)';

    if (data.length === 0) {
      tbody.innerHTML = '';
      table.style.display = 'none';
      noMsg.style.display = 'block';
      return;
    }

    table.style.display = '';
    noMsg.style.display = 'none';

    tbody.innerHTML = data.map(function(e, i) {
      var typeClass = e.type ? e.type.toLowerCase() : 'equipment';
      return '<tr>' +
        '<td style="color:var(--text-dim);font-family:var(--font-mono);font-size:0.75rem">' + (i+1) + '</td>' +
        '<td><strong>' + escHtml(e.name) + '</strong></td>' +
        '<td class="kks-code">' + escHtml(e.kks) + '</td>' +
        '<td><span class="type-badge ' + typeClass + '">' + escHtml(e.type) + '</span></td>' +
        '<td style="color:var(--text-secondary);font-size:0.82rem">' + escHtml(e.description) + '</td>' +
        '<td style="text-align:center">' +
          '<button onclick="openModal(\'' + e.id + '\')" ' +
            'style="background:none;border:1px solid var(--accent-blue);color:var(--accent-blue);border-radius:4px;padding:0.2rem 0.5rem;cursor:pointer;font-size:0.72rem;margin-right:0.3rem" title="Edit">✎</button>' +
          '<button onclick="deleteItem(\'' + e.id + '\')" ' +
            'style="background:none;border:1px solid var(--accent-red);color:var(--accent-red);border-radius:4px;padding:0.2rem 0.5rem;cursor:pointer;font-size:0.72rem" title="Hapus">🗑</button>' +
        '</td>' +
      '</tr>';
    }).join('');
  }

  // ── FILTER ───────────────────────────────────────────────────
  function filterTable() {
    var q    = document.getElementById('searchInput').value.toLowerCase();
    var type = document.getElementById('filterType').value;
    var filtered = eqData.equipment.filter(function(e) {
      var matchQ = !q ||
        e.name.toLowerCase().includes(q) ||
        e.kks.toLowerCase().includes(q)  ||
        (e.description || '').toLowerCase().includes(q);
      var matchT = !type || e.type === type;
      return matchQ && matchT;
    });
    renderTable(filtered);
  }

  // ── MODAL ────────────────────────────────────────────────────
  function openModal(id) {
    var modal = document.getElementById('equipModal');
    if (id) {
      var e = eqData.equipment.find(function(eq) { return eq.id === id; });
      if (!e) return;
      document.getElementById('editId').value   = e.id;
      document.getElementById('editName').value = e.name;
      document.getElementById('editKks').value  = e.kks;
      document.getElementById('editType').value = e.type;
      document.getElementById('editDesc').value = e.description || '';
      document.getElementById('modalTitle').textContent = 'EDIT PERALATAN';
    } else {
      document.getElementById('editId').value   = '';
      document.getElementById('editName').value = '';
      document.getElementById('editKks').value  = '';
      document.getElementById('editType').value = 'Equipment';
      document.getElementById('editDesc').value = '';
      document.getElementById('modalTitle').textContent = 'TAMBAH PERALATAN';
    }
    modal.classList.add('active');
    document.getElementById('editName').focus();
  }

  function closeModal() {
    document.getElementById('equipModal').classList.remove('active');
  }

  function saveItem() {
    var name = document.getElementById('editName').value.trim();
    var kks  = document.getElementById('editKks').value.trim();
    var type = document.getElementById('editType').value;
    var desc = document.getElementById('editDesc').value.trim();
    var id   = document.getElementById('editId').value;

    if (!name) { showToast('Nama peralatan wajib diisi', true); return; }
    if (!kks)  { showToast('Kode KKS wajib diisi', true); return; }

    if (id) {
      var e = eqData.equipment.find(function(eq) { return eq.id === id; });
      if (e) { e.name = name; e.kks = kks; e.type = type; e.description = desc; }
    } else {
      eqData.equipment.push({ id: genId('eq'), name: name, kks: kks, type: type, description: desc });
    }

    saveData();
    closeModal();
    filterTable();
    showToast(id ? 'Peralatan diperbarui' : 'Peralatan ditambahkan');
  }

  function deleteItem(id) {
    var e = eqData.equipment.find(function(eq) { return eq.id === id; });
    if (!e) return;
    if (!confirm('Hapus peralatan "' + e.name + '"?')) return;
    eqData.equipment = eqData.equipment.filter(function(eq) { return eq.id !== id; });
    saveData();
    filterTable();
    showToast('Peralatan dihapus');
  }

  // ── EXPORT CSV ───────────────────────────────────────────────
  function exportCSV() {
    var rows = [['No','Nama Peralatan','Kode KKS','Tipe','Keterangan']];
    eqData.equipment.forEach(function(e, i) {
      rows.push([
        i+1,
        '"' + (e.name||'').replace(/"/g,'""') + '"',
        '"' + (e.kks||'').replace(/"/g,'""') + '"',
        '"' + (e.type||'').replace(/"/g,'""') + '"',
        '"' + (e.description||'').replace(/"/g,'""') + '"'
      ]);
    });
    var csv = rows.map(function(r) { return r.join(','); }).join('\n');
    var blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
    var url  = URL.createObjectURL(blob);
    var a    = document.createElement('a');
    a.href     = url;
    a.download = 'dcs-pltu-peralatan.csv';
    a.click();
    URL.revokeObjectURL(url);
    showToast('CSV berhasil diexport');
  }

  // Close modal on overlay click / Escape
  document.addEventListener('click', function(e) {
    if (e.target === document.getElementById('equipModal')) closeModal();
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
    if (e.key === 'Enter' && document.getElementById('equipModal').classList.contains('active')) saveItem();
  });
  </script>
</body>
</html>
