<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editor — DCS PLTU Interaktif</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HEADER -->
  <header class="app-header">
    <div class="header-left">
      <div class="app-logo">⚡</div>
      <div>
        <div class="app-title">DCS PLTU — EDITOR</div>
        <div class="app-subtitle">Hotspot & Layout Manager</div>
      </div>
    </div>
    <nav class="main-nav">
      <a href="index.html" class="nav-btn">PETA</a>
      <a href="equipment.html" class="nav-btn">PERALATAN</a>
      <a href="procedure.html" class="nav-btn">PROSEDUR</a>
      <a href="editor.html" class="nav-btn editor-btn active">EDITOR</a>
    </nav>
  </header>

  <!-- LOGIN -->
  <div class="login-modal" id="loginModal">
    <div class="login-card">
      <h2>🔐 EDITOR LOGIN</h2>
      <input type="password" id="passwordInput" placeholder="Password..."
        onkeydown="if(event.key==='Enter') checkLogin()">
      <button onclick="checkLogin()">MASUK</button>
      <div class="login-error" id="loginError"></div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="editor-layout" id="editorLayout" style="display:none">

    <main class="editor-canvas-area">
      <div class="editor-toolbar">
        <button onclick="setTool('select')">↖ Pilih</button>
        <button onclick="setTool('add')">+ Tambah</button>
        <button onclick="setTool('move')">✥ Geser</button>
        <button onclick="deleteSelected()">🗑 Hapus</button>
        <div class="toolbar-spacer"></div>
        <button onclick="saveAll()">💾 Simpan</button>
        <button onclick="cancelChanges()">✕ Batal</button>
      </div>

      <div class="editor-canvas-wrapper" id="canvasWrapper">
        <div class="editor-canvas" id="editorCanvas">
          <div class="canvas-bg" id="canvasBg"></div>
          <div class="canvas-hotspots" id="canvasHotspots"></div>
        </div>
      </div>
    </main>

  </div>

  <!-- FILE INPUT -->
  <input type="file" id="fileInput" accept="image/*" style="display:none">

  <!-- HOTSPOT MODAL -->
  <div id="hotspotModal" class="modal-overlay" style="display:none;">
    <div class="modal-card" onclick="event.stopPropagation()">
      <button onclick="closeHotspotModal()">×</button>
      <h3>EDIT HOTSPOT</h3>

      <input type="text" id="hsNama" placeholder="Nama Peralatan">
      <input type="text" id="hsKks" placeholder="Kode KKS">

      <select id="hsTipe">
        <option value="valve">Valve</option>
        <option value="equipment">Equipment</option>
        <option value="sensor">Sensor</option>
      </select>

      <textarea id="hsDesc" placeholder="Keterangan"></textarea>

      <div>
        <button onclick="deleteHotspot()">🗑 Hapus</button>
        <button onclick="saveHotspot()">💾 Simpan</button>
      </div>
    </div>
  </div>

  <!-- SCRIPT -->
  <script src="data.js"></script>
  <script src="editor.js"></script>

</body>
</html>
